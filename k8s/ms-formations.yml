apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-formations
  namespace: senexpertformation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-formations
  template:
    metadata:
      labels:
        app: ms-formations
    spec:
      containers:
        - name: ms-formations
          image: senexpertformation-ms-formations:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: senexpert-config
                  key: DB_HOST_FORMATIONS
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: senexpert-config
                  key: DB_PORT_FORMATIONS
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: senexpert-config
                  key: DB_NAME_FORMATIONS
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: senexpert-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: senexpert-secret
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: ms-formations-service
  namespace: senexpertformation
spec:
  type: NodePort
  selector:
    app: ms-formations
  ports:
    - port: 8082
      targetPort: 8082
      nodePort: 30082