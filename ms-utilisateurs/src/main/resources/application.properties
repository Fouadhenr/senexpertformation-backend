server.port=8081
spring.application.name=ms-utilisateurs

# ${DB_HOST:localhost} signifie : utilise la variable d'env DB_HOST
# si elle existe, sinon utilise "localhost" comme valeur par défaut
# → en local Eclipse : localhost (comme avant)
# → dans Docker : le nom du conteneur pg-utilisateurs
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_utilisateurs}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true